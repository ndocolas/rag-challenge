name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Type check (mypy)
        run: uv run mypy

  tests:
    name: Tests & Coverage (>= 90%)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev --frozen

      - name: Run unit tests with coverage gate
        env:
          GOOGLE_API_KEY: test-key
          ENV: test
        run: uv run pytest -m "not integration"
