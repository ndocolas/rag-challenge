services:
  redis:
    image: redis:7-alpine
    container_name: bulas-redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: bulas-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - >-
          exec 3<>/dev/tcp/localhost/6333 &&
          printf 'GET /readyz HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
          read -r status <&3 &&
          [[ "$$status" == *200* ]]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  backend:
    build:
      context: .
    image: bulas-assistant-backend:dev
    container_name: bulas-backend
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      # Lightweight: short timeout, fails fast so the orchestrator can react.
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request, sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',
            timeout=2).status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      context: ./frontend
    container_name: bulas-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  ingest:
    build:
      context: .
    container_name: bulas-ingest
    profiles: ["ingest"]
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: ["python", "scripts/ingest_bulas.py", "--rebuild"]

volumes:
  qdrant_data:
